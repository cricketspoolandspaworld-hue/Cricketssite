<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket's Pool & Spa World - VSP Calculator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for browser-side JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0891b2; /* cyan-600 */
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Inline SVG Components for portability
        const IconDroplets = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.8 4-4 0-3.3-4-6.3-4-6.3s-4 3-4 6.3c0 2.2 1.8 4 4 4Z"/><path d="M17 18.5c2.5 0 4.5-2.5 4.5-5.8 0-4.8-4.5-9.2-4.5-9.2s-4.5 4.4-4.5 9.2c0 3.3 2 5.8 4.5 5.8Z"/></svg>
        );
        const IconSettings = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const IconGauge = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
        );
        const IconZap = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        );
        const IconClock = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        );
        const IconWaves = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 3 0 3-2 5.5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 3 0 3-2 5.5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>
        );
        const IconRefresh = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        );
        const IconInfo = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );

        const pumps = [
            { id: 'intelliflo3', name: 'Pentair IntelliFlo3 VSF', baseGpm: 130 },
            { id: 'tristar27', name: 'Hayward TriStar VS 2.7 HP', baseGpm: 120 },
            { id: 'whisperflo', name: 'Pentair WhisperFlo VST', baseGpm: 115 },
            { id: 'tristar185', name: 'Hayward TriStar VS 1.85 HP', baseGpm: 100 },
            { id: 'superflo', name: 'Pentair SuperFlo VST', baseGpm: 90 },
        ];

        function App() {
            const [selectedPump, setSelectedPump] = useState(pumps[0].id);
            const [volume, setVolume] = useState(15000);
            const [tdh, setTdh] = useState(50);
            const [rpm, setRpm] = useState(1750);

            const pump = pumps.find((p) => p.id === selectedPump);
            const tdhMultiplier = Math.max(0.1, 1 - ((tdh - 50) * 0.01)); 
            const adjustedBaseGpm = pump.baseGpm * tdhMultiplier;
            const actualGpm = adjustedBaseGpm * (rpm / 3450);
            const turnoverTime = actualGpm > 0 ? volume / (actualGpm * 60) : 0;
            const dailyTurnovers = turnoverTime > 0 ? 24 / turnoverTime : 0;
            const percentSpeed = Math.round((rpm / 3450) * 100);

            const gaugePercent = Math.min(100, (turnoverTime / 24) * 100);
            let gaugeColor = 'bg-red-600';
            let statusText = 'Critical: Risk of Stagnation';
            let statusColor = 'text-red-700';
            
            if (turnoverTime <= 8) {
                gaugeColor = 'bg-emerald-600';
                statusText = 'Optimal: Acadiana Target Met';
                statusColor = 'text-emerald-600';
            } else if (turnoverTime <= 12) {
                gaugeColor = 'bg-cyan-600';
                statusText = 'Acceptable: Monitor for Algae';
                statusColor = 'text-cyan-700';
            }

            return (
                <div className="min-h-screen pb-12">
                    <nav className="bg-cyan-900 text-white sticky top-0 z-50 shadow-md">
                        <div className="max-w-6xl mx-auto px-4 md:px-8 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="bg-white/10 p-2 rounded-lg text-cyan-400">
                                    <IconDroplets />
                                </div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-bold tracking-tight">Cricket's Pool & Spa World</h1>
                                    <p className="text-cyan-200 text-[10px] md:text-xs font-medium uppercase tracking-widest">
                                        Service Technician Portal • Lafayette
                                    </p>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="p-4 md:p-8 max-w-6xl mx-auto mt-4">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            <section className="lg:col-span-5 space-y-6">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <header className="mb-6 flex items-center gap-2 border-b border-slate-100 pb-4">
                                        <span className="text-cyan-600"><IconSettings /></span>
                                        <h2 className="text-lg font-bold tracking-tight">System Configuration</h2>
                                    </header>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Pump Model</label>
                                            <select 
                                                value={selectedPump}
                                                onChange={(e) => setSelectedPump(e.target.value)}
                                                className="w-full border-slate-200 rounded-xl bg-slate-50 p-3 border-2 outline-none font-bold text-slate-700 focus:border-cyan-600 transition-all appearance-none"
                                            >
                                                {pumps.map(p => (
                                                    <option key={p.id} value={p.id}>{p.name}</option>
                                                ))}
                                            </select>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Volume (Gal)</label>
                                                <div className="relative">
                                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-cyan-600 scale-75"><IconDroplets /></span>
                                                    <input type="number" value={volume} onChange={(e) => setVolume(Number(e.target.value))} className="w-full pl-10 pr-4 py-3 border-2 border-slate-200 rounded-xl bg-slate-50 font-bold outline-none focus:border-cyan-600" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">TDH (Feet)</label>
                                                <div className="relative">
                                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-cyan-600 scale-75"><IconGauge /></span>
                                                    <input type="number" value={tdh} onChange={(e) => setTdh(Number(e.target.value))} className="w-full pl-10 pr-4 py-3 border-2 border-slate-200 rounded-xl bg-slate-50 font-bold outline-none focus:border-cyan-600" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="pt-6 border-t border-slate-100">
                                            <h3 className="text-sm font-bold text-slate-700 mb-6 flex items-center gap-2">
                                                <span className="text-cyan-600"><IconZap /></span> Speed Selection
                                            </h3>
                                            <div className="space-y-8">
                                                <div>
                                                    <div className="flex justify-between items-end mb-3">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">RPM</span>
                                                        <span className="text-sm font-black text-cyan-700 bg-cyan-50 px-3 py-1 rounded-lg border border-cyan-100">{rpm} RPM</span>
                                                    </div>
                                                    <input type="range" min="500" max="3450" step="10" value={rpm} onChange={(e) => setRpm(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-xl appearance-none cursor-pointer" />
                                                </div>
                                                <div>
                                                    <div className="flex justify-between items-end mb-3">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Motor %</span>
                                                        <span className="text-sm font-black text-cyan-700 bg-cyan-50 px-3 py-1 rounded-lg border border-cyan-100">{percentSpeed}%</span>
                                                    </div>
                                                    <input type="range" min="15" max="100" step="1" value={percentSpeed} onChange={(e) => setRpm(Math.round((Number(e.target.value) / 100) * 3450))} className="w-full h-2 bg-slate-200 rounded-xl appearance-none cursor-pointer" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="lg:col-span-7 space-y-6">
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-center items-center">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="text-cyan-600"><IconWaves /></span>
                                            <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Flow Rate</span>
                                        </div>
                                        <div className="text-6xl font-black tracking-tighter text-slate-800">
                                            {actualGpm.toFixed(0)}<span className="text-xl text-slate-400 font-bold ml-1 uppercase tracking-widest">GPM</span>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-center items-center">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="text-cyan-600"><IconRefresh /></span>
                                            <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Daily Turn</span>
                                        </div>
                                        <div className="text-6xl font-black tracking-tighter text-slate-800">
                                            {dailyTurnovers.toFixed(1)}<span className="text-xl text-slate-400 font-bold ml-1 uppercase tracking-widest">/Day</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-xl shadow-lg border border-slate-200 relative overflow-hidden">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-cyan-600"><IconClock /></span>
                                                <h3 className="text-xl font-bold tracking-tight">Turnover Window</h3>
                                            </div>
                                            <p className={`text-sm font-bold tracking-tight mt-1 px-3 py-1 bg-slate-50 rounded-full inline-block border border-slate-100 ${statusColor}`}>
                                                {statusText}
                                            </p>
                                        </div>
                                        <div className="text-5xl font-black tracking-tighter text-slate-800">
                                            {turnoverTime.toFixed(1)}<span className="text-xl text-slate-400 font-bold ml-1 uppercase tracking-widest">Hrs</span>
                                        </div>
                                    </div>
                                    <div className="relative pt-10 pb-4">
                                        <div className="w-full bg-slate-100 rounded-full h-6 relative shadow-inner">
                                            <div className="absolute top-0 left-[33.33%] h-full w-0.5 bg-slate-300 z-10"></div>
                                            <div className="absolute top-0 left-[50%] h-full w-0.5 bg-slate-300 z-10"></div>
                                            <div className="absolute -top-8 left-[33.33%] -translate-x-1/2 text-[10px] font-black text-emerald-700 bg-emerald-50 px-2 py-1 rounded-md border border-emerald-200">8H TARGET</div>
                                            <div className="absolute -top-8 left-[50%] -translate-x-1/2 text-[10px] font-black text-amber-700 bg-amber-50 px-2 py-1 rounded-md border border-amber-200">12H LIMIT</div>
                                            <div className={`h-full rounded-full transition-all duration-700 shadow-sm ${gaugeColor}`} style={{ width: `${gaugePercent}%` }}></div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-slate-800 p-8 rounded-xl border-l-4 border-cyan-400 shadow-xl text-slate-300">
                                    <header className="flex items-center gap-2 mb-6 text-cyan-400">
                                        <IconInfo />
                                        <h4 className="text-sm font-black uppercase tracking-[0.2em] text-white">Acadiana Field Strategy</h4>
                                    </header>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm leading-relaxed">
                                        <div>
                                            <p className="mb-4 text-white font-bold uppercase tracking-wider text-xs">National Standard:</p>
                                            <p className="mb-4">PHTA suggests 1 turnover per 24 hours. Nationally, 12 hours is "acceptable."</p>
                                            <p className="text-cyan-300 font-bold uppercase tracking-wider text-xs">Lafayette Reality:</p>
                                            <p>Lafayette humidity and heat demand more. 12-hour windows lead to algae blooms in August.</p>
                                        </div>
                                        <div className="border-t md:border-t-0 md:border-l border-slate-700 pt-6 md:pt-0 md:pl-8 italic">
                                            <p className="mb-4">"Always aim for an 8-hour turnover. It ensures chemical distribution hits the deep end dead zones where algae starts."</p>
                                            <div className="flex items-center gap-3">
                                                <div className="h-0.5 w-8 bg-cyan-400"></div>
                                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Charley's Rule of Thumb</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
